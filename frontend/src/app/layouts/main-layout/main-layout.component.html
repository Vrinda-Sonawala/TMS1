<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    [mode]="sidenavMode"
    [opened]="sidenavOpened"
    class="aegis-sidenav"
    fixedInViewport
    [disableClose]="!isMobile">

    <div class="sidenav-brand">
      <mat-icon>account_balance</mat-icon>
      <div>
        <span class="brand-name">Aegis Capital</span>
        <span class="brand-tag">Private Banking</span>
      </div>
    </div>

    <mat-nav-list class="nav-list">
      @for (item of navItems; track item.route) {
        <a mat-list-item
           [routerLink]="item.route"
           routerLinkActive="active"
           (click)="closeDrawerOnMobile()">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>

    <div class="sidenav-footer">
      <button mat-stroked-button class="logout-btn" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Logout
      </button>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="aegis-toolbar">
      @if (isMobile) {
        <button mat-icon-button (click)="drawer.toggle()">
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-spacer"></span>
      <div class="toolbar-user">
        <div class="user-info d-none d-md-block">
          <span class="user-name">{{ user?.fullName }}</span>
          <span class="user-email">{{ user?.email }}</span>
        </div>
        <button mat-icon-button [matMenuTriggerFor]="userMenu">
          <mat-icon>account_circle</mat-icon>
        </button>
        <mat-menu #userMenu="matMenu">
          <button mat-menu-item routerLink="/dashboard">
            <mat-icon>dashboard</mat-icon> Dashboard
          </button>
          <button mat-menu-item routerLink="/accounts">
            <mat-icon>account_balance_wallet</mat-icon> My Accounts
          </button>
          <mat-divider></mat-divider>
          <button mat-menu-item (click)="logout()">
            <mat-icon>logout</mat-icon> Sign Out
          </button>
        </mat-menu>
      </div>
    </mat-toolbar>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
